name: Audit dependencies

"on":
  pull_request:
    branches:
      - main
      - release
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  audit:
    name: "Audit dependencies (Node ${{ matrix.node-version }})"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        node-version: [20, 22]
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Audit dependencies
        run: npm audit --audit-level=high
