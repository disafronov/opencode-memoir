---
name: Publish to npm

"on":
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  publish:
    name: "Publish to npm"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write    # for npm trusted publishing (OIDC)
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24  # npm 11+ required for OIDC
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest

      - name: Verify version matches tag
        run: |
          TAG_NAME="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_NAME" != "$PKG_VERSION" ]; then
            echo "Error: Version mismatch!"
            echo "Tag: $GITHUB_REF_NAME"
            echo "Expected version in package.json: $TAG_NAME"
            echo "Actual version in package.json: $PKG_VERSION"
            exit 1
          fi
          echo "Version verification passed: $PKG_VERSION"

      - name: Install dependencies
        run: npm ci

      - name: Publish to npm
        # build, test, and smoke check run via prepublishOnly
        run: npm publish --provenance --access public
